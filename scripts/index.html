    <style>
        body {
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            height: 100%;
        }
        hr {
            background-color: rgb(66, 73, 87);
            height: 1px;
            border: 0;
        }
        sbase {
            display: block;
            position: fixed center;
            text-align: center;
            text-shadow: 2px;
            height: 12vh;
            width: 60%;
            margin: -1vh 20%;
            padding-top: 1vh;
            padding-bottom: 2.5vh;
            border-radius: 1.5vh;
            color: rgb(142, 167, 204);
            background-image: radial-gradient(rgb(32, 48, 49), rgb(27, 37, 37));
            line-height: 0vh;
            z-index: 2;
        }
        offset {
            display: block;
            position:absolute;
            text-align: left;
            height: 72vh;
            width: 23%;
            margin: 2.5% 20%;
            padding-top: 1vh;
            padding-bottom: 1px;
            padding-left: 3%;
            padding-right: 3%;
            border-radius: 2vh;
            color: rgb(142, 167, 204);
            background-image: radial-gradient(rgb(32, 48, 49, 0.8), rgb(27, 37, 37, 0.8));
            font-size: 1.8vh;
            line-height: 1.8vh;
            z-index: 2;
            
        }

        /*cube thing---------------*/
        .cubeframe {
            width: 400px;
            height: 400px;
            perspective: 600px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            margin: 50% 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .face {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px solid #fff;
            z-index: 1;
        }

        .front  { transform: rotateY(0deg) translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }
        /*---------------*/

    </style>
</head>
