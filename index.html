<!DOCTYPE html>
<html lang="da">
<head>
    <script src="scripts/lang.js"></script>

    <title>Portfolio - NV</title>

    <style>
        :root {
            --cubeSize: 80vh;
            --cubeSize2: calc(var(--cubeSize)/2);
            --bgimg: radial-gradient(rgb(32, 48, 49, 1), rgb(35, 45, 45, 1), rgb(27, 37, 38, 0.85))
        }
        body {
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            height: 100%;
        }
        hr {
            background-color: rgb(66, 73, 87);
            height: 1px;
            border: 0;
        }

        sbase {
            display: block;
            position: fixed center;
            text-align: center;
            text-shadow: 2px;
            height: 12vh;
            width: 60%;
            margin: -1vh 20%;
            padding-top: 1vh;
            padding-bottom: 2.5vh;
            border-radius: 1.5vh;
            color: rgb(142, 167, 204);
            background-image: var(--bgimg);
            line-height: 0vh;
        }
        offset {
            display: block;
            position:absolute;
            text-align: left;
            height: 72vh;
            width: 23%;
            margin: 2.5vh 20%;
            padding-top: 1vh;
            padding-bottom: 1px;
            padding-left: 3%;
            padding-right: 3%;
            border-radius: 2vh;
            color: rgb(142, 167, 204);
            background-image: var(--bgimg);
            font-size: 1.8vh;
            line-height: 1.8vh;
            z-index: 2;
        }


        /*cube thing---------------*/
        .cubeframe {
            width: var(--cubeSize);
            height: var(--cubeSize);
            perspective: 100vh;
            margin: calc(50% - (var(--cubeSize2))) calc(50% - var(--cubeSize2));
        }

        .cube {
            width: 100%;
            height: 100%;
            position: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .face {
            position: absolute;
            width: var(--cubeSize);
            height: var(--cubeSize);
            border: 1px solid #ffca99;
            z-index: -10;
        }

        .front  { transform: rotateY(0deg) translateZ(var(--cubeSize2)); }
        .back   { transform: rotateY(180deg) translateZ(var(--cubeSize2)); }
        .left   { transform: rotateY(-90deg) translateZ(var(--cubeSize2)); }
        .right  { transform: rotateY(90deg) translateZ(var(--cubeSize2)); }
        .top    { transform: rotateX(90deg) translateZ(var(--cubeSize2)); }
        .bottom { transform: rotateX(-90deg) translateZ(var(--cubeSize2)); }
        /*---------------*/

        /*dot particle canvas*/
        #dotscanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

    </style>
</head>
<body style="
    background-image: radial-gradient(rgb(34, 43, 43), rgb(13, 20, 20));
    min-height: 200vh;
    text-shadow: 0 0 1vh black;
">

    <sbase>

        <p>

    <offset style="margin-left: 51%;">

                <li data-key="ul12"></li>
                <li data-key="ul13"></li>
                <li data-key="ul14"></li>
                <li data-key="ul15"></li>
                <li data-key="ul16"></li>
            </ul>
        </p>

        <hr>

        <h2 data-key="h5"></h2> <!--Kendskaber-->
        <p>
            <ul style="padding-left: 0%;">
                <li>HTML, SQL, Java, Assembly, Python</li>
                <li>Powershell, Linux, HyperV, VirtualBox</li>

        <p style="text-align:left;line-height: 40px; margin: 11% -10%;">
            <img src="/img/github-icon.png" style="float:left;width: 40px;height: 40px;">
            <a href="https://github.com/n-valentin" style="color: rgb(116, 157, 218);">n-valentin</a>

    <!--spawn funny cube-->
    <div class="cubeframe" style="position: center;">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>

    <script src="scripts/cubefx.js"></script>

    <canvas id="dotscanvas"></canvas>
    <script src="scripts/dotsfx.js"></script>

</body>
</html>
