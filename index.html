<!DOCTYPE html>
<html lang="da">
<head>
    <script src="scripts/lang.js"></script>

    <title>Portfolio - NV</title>

    <style>
        :root {
            --cubeSize: 80vh;
            --cubeSize2: calc(var(--cubeSize)/2);
            --bgimg: radial-gradient(rgb(32, 48, 49, 1), rgb(35, 45, 45, 1), rgb(27, 37, 38, 0.85));
            --baseWidth: 800px;
            --basePadding: 24px;

            /*figuring this out took longer than it should I am NOT touching this shit again*/
            --offsetWidth: calc((var(--baseWidth) / 2) - var(--basePadding)*1.5);
            --offsetMargin-leftLeft: calc((50% - var(--offsetWidth)) - var(--basePadding)*1.5);
            --offsetMargin-leftRight: calc((50% + var(--basePadding)*1.5));
            --baseBorderRadius: 24px;
        }
        body {
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            height: 100%;
        }
        hr {
            background-color: rgb(66, 73, 87);
            height: 1px;
            border: 0;
        }

        sbase {
            display: block;
            text-align: center;
            text-shadow: 2px;
            height: 100px;
            width: var(--baseWidth);
            padding: var(--basePadding);
            margin: -16px calc(50% - (var(--baseWidth) / 2));
            border-radius: var(--baseBorderRadius);
            color: rgb(142, 167, 204);
            background-image: var(--bgimg);
            line-height: 0;
        }
        offset {
            display: block;
            position: absolute;
            text-align: left;
            height: 620px;
            width: var(--offsetWidth);
            padding: var(--basePadding);
            margin: 30px var(--offsetMargin-leftLeft);
            border-radius: var(--baseBorderRadius);
            color: rgb(142, 167, 204);
            background-image: var(--bgimg);
            font-size: 14px;
            line-height: 18px;
            z-index: 1;
            padding-top: 10px;
        }


        /*cube thing---------------*/
        .cubeframe {
            width: var(--cubeSize);
            height: var(--cubeSize);
            perspective: 100vh;
            margin: calc(50% - (var(--cubeSize2))) calc(50% - var(--cubeSize2));
        }

        .cube {
            width: 100%;
            height: 100%;
            position: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .face {
            position: absolute;
            width: var(--cubeSize);
            height: var(--cubeSize);
            border: 1px solid #ffca99;
            z-index: -10;
        }

        .front  { transform: rotateY(0deg) translateZ(var(--cubeSize2)); }
        .back   { transform: rotateY(180deg) translateZ(var(--cubeSize2)); }
        .left   { transform: rotateY(-90deg) translateZ(var(--cubeSize2)); }
        .right  { transform: rotateY(90deg) translateZ(var(--cubeSize2)); }
        .top    { transform: rotateX(90deg) translateZ(var(--cubeSize2)); }
        .bottom { transform: rotateX(-90deg) translateZ(var(--cubeSize2)); }
        /*---------------*/

        /*dot particle canvas*/
        #dotscanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

    </style>
</head>
<body style="
    background-image: radial-gradient(rgb(34, 43, 43), rgb(13, 20, 20));
    min-height: 200vh;
    text-shadow: 0 0 1vh black;
">

    <!--spawn funny cube-->
    <div class="cubeframe" style="position: center;">

    <script src="scripts/cubefx.js"></script>

    <canvas id="dotscanvas"></canvas>

</body>
</html>
